ai_usage_summary: |
  Used Claude for architecture design discussion, debugging Colab errors,
  and code review while building the candidate ranking pipeline. No
  candidate data was sent to any LLM API — all scoring runs locally using
  the open-source sentence-transformer model (BAAI/bge-base-en-v1.5).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid 3-signal ranker combining semantic similarity, career fit, and
  behavioral engagement. Candidate text profiles are built with weighted
  fields (current title x3, headline x2, most recent job x3, expert-level
  skills x2) and embedded using BAAI/bge-base-en-v1.5, then scored against
  the job description via cosine similarity (50% weight). A career score
  (30%) rewards 5-9 years experience, product-company background, India
  location, and GitHub activity, while penalizing pure services-firm
  careers. A behavioral score (20%) applies exponential recency decay to
  last-active date alongside response rate, interview completion, and
  notice period. A honeypot filter removes candidates with impossible
  career timelines or unrealistic all-expert skill profiles before
  ranking. Output is validated for row count, duplicate IDs, and rank
  ordering before being finalized as submission.csv.

